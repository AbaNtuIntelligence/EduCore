services:
  - type: web
    name: educore-site
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: educore2026
      - key: JWT_SECRET
        value: my-super-secret-key-2026-xyz-123
